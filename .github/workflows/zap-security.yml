name: OWASP ZAP Full Security CI

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Khởi chạy OWASP Juice Shop
      run: docker run --rm -d -p 3000:3000 bkimminich/juice-shop

    - name: Xử lý thời gian chờ (Wait-for-it)
      run: |
        echo "Đợi ứng dụng khởi động..."
        sleep 40
        curl -s --head http://localhost:3000

    - name: Cấp quyền không gian làm việc
      run: chmod -R 777 $(pwd)

    # ⭐ QUAN TRỌNG: thêm debug để thấy rõ log AJAX Spider
    - name: Quét Full Scan (Active) + AJAX Spider
      run: |
        docker run --network host \
        -v $(pwd):/zap/wrk/:rw \
        -t ghcr.io/zaproxy/zaproxy:stable \
        zap-full-scan.py \
        -t http://localhost:3000 \
        -r zap-report.html \
        -J zap-report.json \
        -c zap.conf \
        -j \
        -d \
        -m 2

    - name: Lưu trữ Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: zap-reports-and-conf
        path: |
          zap-report.html
          zap-report.json
          zap.conf
